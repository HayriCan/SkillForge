name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Debug - Tauri CLI version and env check
        shell: bash
        run: |
          npx tauri --version
          echo "KEY set: $([ -n "$TAURI_SIGNING_PRIVATE_KEY" ] && echo 'yes' || echo 'no')"
          echo "KEY length: ${#TAURI_SIGNING_PRIVATE_KEY}"
          echo "PWD set: $([ -n "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ] && echo 'yes' || echo 'no')"
          echo "PWD length: ${#TAURI_SIGNING_PRIVATE_KEY_PASSWORD}"

      - name: Build Tauri app
        shell: bash
        run: npx tauri build ${{ matrix.args }} -v

      - name: Debug - list artifacts
        shell: bash
        run: |
          echo "=== Signature files ==="
          find src-tauri/target -name "*.sig" -type f 2>/dev/null || echo "No .sig files"
          echo "=== Updater archives ==="
          find src-tauri/target -path "*/bundle/*" \( -name "*.zip" -o -name "*.tar.gz" \) -type f 2>/dev/null || echo "No archives"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Skill Forge ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG.md for release notes.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          updaterJsonKeepUniversal: true
