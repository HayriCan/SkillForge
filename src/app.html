    <script>
      (function() {
        var t = localStorage.getItem('sf-theme') || 'auto';
        var resolved = t;
        if (t === 'auto') resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', resolved);
        document.documentElement.style.background = resolved === 'dark' ? '#09090b' : '#ffffff';
      })();
    </script>
    %sveltekit.head%
  </head>

    <style>
      #splash {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        animation: splashIn 0.4s ease-out;
      }
      .splash-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }
      .splash-content img {
        opacity: 0.7;
        animation: splashPulse 2s ease-in-out infinite;
      }
      .splash-title {
        color: #71717a;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
      .splash-bar {
        width: 120px;
        height: 2px;
        background: #27272a;
        border-radius: 1px;
        overflow: hidden;
      }
      .splash-bar-fill {
        width: 40%;
        height: 100%;
        background: #3f3f46;
        border-radius: 1px;
        animation: splashLoad 1.2s ease-in-out infinite;
      }
      @keyframes splashIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes splashPulse {
        0%, 100% { opacity: 0.7; }
        50% { opacity: 0.4; }
      }
      @keyframes splashLoad {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(400%); }
      }
      #app:has(main) #splash { display: none !important; }
    </style>
  </body>
